name: Build unsigned IPA

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos dependencies
        run: brew install ldid

      - name: Clone Theos
        run: |
          if [ ! -d ~/theos ]; then
            git clone --depth 1 https://github.com/theos/theos ~/theos --recursive
          fi

      - name: Install Theos SDK
        run: |
          THEOS=~/theos
          SDK_DIR="$THEOS/sdks"
          mkdir -p "$SDK_DIR"
          # Only download if SDK not already cached
          if [ ! -f "$SDK_DIR/iPhoneOS16.5.sdk/SDKSettings.plist" ]; then
            echo "Downloading iPhoneOS16.5 SDK..."
            curl -fsSL -o /tmp/iphoneos_sdk.zip "https://github.com/theos/sdks/releases/download/master/iPhoneOS16.5.sdk.zip" || \
            curl -fsSL -o /tmp/iphoneos_sdk.zip "https://cdn.altstore.io/sdks/iPhoneOS16.5.sdk.zip" || \
            curl -fsSL -o /tmp/iphoneos_sdk.zip "https://api.github.com/repos/theos/sdks/zipball/master"
            if [ -f /tmp/iphoneos_sdk.zip ]; then
              unzip -qo /tmp/iphoneos_sdk.zip -d "$SDK_DIR/"
              # If it extracted to a subdirectory, move contents
              if [ ! -f "$SDK_DIR/iPhoneOS16.5.sdk/SDKSettings.plist" ]; then
                mv "$SDK_DIR"/*/iPhoneOS16.5.sdk "$SDK_DIR/" 2>/dev/null || true
              fi
            fi
          fi
          ls -la "$SDK_DIR/" || true
          # Verify
          if [ ! -f "$SDK_DIR/iPhoneOS16.5.sdk/SDKSettings.plist" ]; then
            echo "ERROR: SDK installation failed"
            exit 1
          fi
          echo "SDK installed successfully"

      - name: Build app
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      - name: Create unsigned IPA
        run: |
          # Find the built .app (Theos stages it under .theos/_/Applications/)
          APP_PATH=$(find .theos/_ -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find .app bundle. Listing .theos directory:"
            find .theos -type d
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Aloud.ipa Payload/
          echo "IPA created: $(ls -lh Aloud.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aloud-unsigned
          path: Aloud.ipa
